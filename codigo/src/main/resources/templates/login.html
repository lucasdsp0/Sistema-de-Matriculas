<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Login - Sistema de Matrículas</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
            <div class="login-container">
                <div class="card login-card">
                    <div class="card-body">
                        <h3 class="card-title text-center gradient-text mb-4">Login</h3>
                        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${erro}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuário</label>
                                <input type="text" class="form-control" id="username" name="username" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
