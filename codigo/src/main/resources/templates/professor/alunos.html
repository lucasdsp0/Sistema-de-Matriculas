<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Alunos por Disciplina</title>
</head>

<body>
    <div th:fragment="content">
        <h1 class="my-4 gradient-text">Meus Alunos</h1>

        <div class="mb-4">
            <label for="disciplina-select" class="form-label">Selecione uma Disciplina:</label>
            <select class="form-select" id="disciplina-select">
                <!-- Exemplo de Option (será populado pelo backend) -->
                <option>Introdução à Computação</option>
                <option>Estrutura de Dados</option>
            </select>
        </div>

        <h3 class="gradient-text">Alunos em Introdução à Computação</h3>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Matrícula</th>
                        <th scope="col">Nome do Aluno</th>
                        <th scope="col">Email</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo de Linha (será substituído por dados do backend) -->
                    <tr>
                        <td>2023001</td>
                        <td>João da Silva</td>
                        <td>joao.silva@email.com</td>
                    </tr>
                    <tr>
                        <td>2023002</td>
                        <td>Maria Oliveira</td>
                        <td>maria.oliveira@email.com</td>
                    </tr>
                    <!-- Fim do Exemplo -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
