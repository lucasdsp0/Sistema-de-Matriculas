<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Gerar Currículo</title>
</head>

<body>
    <div th:fragment="content">
        <h1 class="my-4 gradient-text">Gerar Currículo do Semestre</h1>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${erro}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/curriculo/save}" th:object="${curriculo}" method="post">
                            <div class="mb-3">
                                <label for="semestre" class="form-label">Semestre</label>
                                <input type="text" class="form-control" id="semestre" th:field="*{semestre}" 
                                       placeholder="Ex: 2024/1" required>
                            </div>

                            <div class="mb-3">
                                <label for="dataInicio" class="form-label">Data de Início</label>
                                <input type="date" class="form-control" id="dataInicio" th:field="*{dataInicio}">
                            </div>

                            <div class="mb-3">
                                <label for="dataFim" class="form-label">Data de Término</label>
                                <input type="date" class="form-control" id="dataFim" th:field="*{dataFim}">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Disciplinas do Currículo</label>
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th scope="col">Selecionar</th>
                                                <th scope="col">Nome</th>
                                                <th scope="col">Professor</th>
                                                <th scope="col">Tipo</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="disciplina : ${disciplinas}">
                                                <td>
                                                    <input class="form-check-input" type="checkbox" 
                                                           name="disciplinaIds" th:value="${disciplina.id}">
                                                </td>
                                                <td th:text="${disciplina.nome}">Disciplina</td>
                                                <td th:text="${disciplina.professor != null ? disciplina.professor.nome : 'A definir'}">Professor</td>
                                                <td>
                                                    <span th:if="${disciplina.obrigatorio}" class="badge bg-danger">Obrigatória</span>
                                                    <span th:unless="${disciplina.obrigatorio}" class="badge bg-info">Optativa</span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/curriculo/lista" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Salvar Currículo</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
