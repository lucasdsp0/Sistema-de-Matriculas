<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Acesso Negado</title>
</head>

<body>
<div th:fragment="content">
    <div class="container text-center my-5">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading">Acesso Negado!</h4>
            <p>Você não tem permissão para acessar esta página.</p>
            <hr>
            <p class="mb-0">Se você acredita que isso é um erro, entre em contato com o administrador do sistema.</p>
        </div>
        <a th:href="@{/}" class="btn btn-primary mt-3">Voltar para a Página Inicial</a>
    </div>
</div>
</body>
</html>
