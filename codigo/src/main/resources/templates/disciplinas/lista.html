<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Lista de Disciplinas</title>
</head>

<body>
    <div th:fragment="content">
        <h1 class="my-4 gradient-text">Disciplinas Ofertadas</h1>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Nome da Disciplina</th>
                        <th scope="col">Professor</th>
                        <th scope="col">Vagas</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="disciplina : ${disciplinas}">
                        <td th:text="${disciplina.id}">ID</td>
                        <td th:text="${disciplina.nome}">Nome da Disciplina</td>
                        <td th:text="${disciplina.professor != null ? disciplina.professor.nome : 'A definir'}">Professor</td>
                        <td th:text="${disciplina.numMaxAlunos}">60</td>
                        <td>
                            <a th:href="@{/matricula/formulario}" class="btn btn-sm btn-primary">Matricular</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
