<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Gerenciar Alunos</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="gradient-text">Gerenciar Alunos</h1>
            <a href="#" class="btn btn-success">+ Novo Aluno</a>
        </div>

        <div th:if="${not #lists.isEmpty(alunos)}" class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Matrícula</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Login</th>
                        <th scope="col">Disciplinas Matriculadas</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="aluno : ${alunos}">
                        <td th:text="${aluno.numMatricula}">Matrícula</td>
                        <td th:text="${aluno.nome}">Nome</td>
                        <td th:text="${aluno.login}">Login</td>
                        <td>
                            <span th:if="${aluno.matriculas != null and !aluno.matriculas.isEmpty()}">
                                <span th:text="${aluno.matriculas.size()}"></span> matrícula(s)
                            </span>
                            <span th:unless="${aluno.matriculas != null and !aluno.matriculas.isEmpty()}" class="text-muted">
                                Nenhuma matrícula
                            </span>
                        </td>
                        <td>
                            <a href="#" class="btn btn-sm btn-info">Editar</a>
                            <a href="#" class="btn btn-sm btn-danger">Deletar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(alunos)}" class="alert alert-info">
            <p>Nenhum aluno cadastrado no sistema.</p>
            <a href="#" class="btn btn-success mt-2">+ Cadastrar Primeiro Aluno</a>
        </div>
    </div>
</body>

</html>
