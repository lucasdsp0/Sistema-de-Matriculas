<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Cadastro de Aluno</title>
</head>

<body>
    <div th:fragment="content">
        <h1 class="my-4 gradient-text">Cadastrar Novo Aluno</h1>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${erro}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/aluno/save}" th:object="${aluno}" method="post">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                            </div>

                            <div class="mb-3">
                                <label for="login" class="form-label">Usuário (Login)</label>
                                <input type="text" class="form-control" id="login" th:field="*{login}" required>
                            </div>

                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" th:field="*{senha}" required>
                            </div>

                            <div class="mb-3">
                                <label for="numMatricula" class="form-label">Número de Matrícula</label>
                                <input type="number" class="form-control" id="numMatricula" th:field="*{numMatricula}" required>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/aluno/lista" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Cadastrar Aluno</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
