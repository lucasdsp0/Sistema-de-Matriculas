<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Minhas Matrículas</title>
</head>

<body>
    <div th:fragment="content">
        <h1 class="my-4 gradient-text">Disciplinas Matriculadas</h1>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Código</th>
                        <th scope="col">Nome da Disciplina</th>
                        <th scope="col">Professor</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo de Linha (será substituído por dados do backend) -->
                    <tr>
                        <td>MA202</td>
                        <td>Matemática Discreta</td>
                        <td>Dra. Ada Lovelace</td>
                        <td><span class="badge bg-success">Matriculado</span></td>
                        <td>
                            <a href="#" class="btn btn-sm btn-danger">Cancelar Matrícula</a>
                        </td>
                    </tr>
                    <tr>
                        <td>CS101</td>
                        <td>Introdução à Computação</td>
                        <td>Dr. Alan Turing</td>
                        <td><span class="badge bg-warning text-dark">Pendente</span></td>
                        <td>
                            <a href="#" class="btn btn-sm btn-danger disabled">Cancelar Matrícula</a>
                        </td>
                    </tr>
                    <!-- Fim do Exemplo -->
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
