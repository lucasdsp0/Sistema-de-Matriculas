<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Minhas Matrículas</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="gradient-text">Disciplinas Matriculadas</h1>
            <a href="/matricula/formulario" class="btn btn-success">+ Efetuar Matrícula</a>
        </div>

        <div th:if="${not #lists.isEmpty(matriculas)}" class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Código</th>
                        <th scope="col">Nome da Disciplina</th>
                        <th scope="col">Professor</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="matricula : ${matriculas}">
                        <td>
                            <span th:each="disc : ${matricula.disciplinas}" th:text="${disc.id}" th:if="${matricula.disciplinas.size() == 1}" >ID</span>
                            <span th:if="${matricula.disciplinas.size() > 1}">Múltiplas</span>
                        </td>
                        <td>
                            <span th:each="disc : ${matricula.disciplinas}" th:text="${disc.nome}" th:if="${matricula.disciplinas.size() == 1}"></span>
                            <span th:if="${matricula.disciplinas.size() > 1}">Múltiplas disciplinas</span>
                        </td>
                        <td>
                            <span th:each="disc : ${matricula.disciplinas}" th:text="${disc.professor != null ? disc.professor.nome : 'A definir'}" th:if="${matricula.disciplinas.size() == 1}"></span>
                            <span th:if="${matricula.disciplinas.size() > 1}">Vários</span>
                        </td>
                        <td><span th:class="'badge ' + (${matricula.status} == 'EFETIVADA' ? 'bg-success' : 'bg-warning text-dark')" th:text="${matricula.status}"></span></td>
                        <td>
                            <form th:action="@{/matricula/cancelar/{id}(id=${matricula.id})}" method="post" style="display: inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Tem certeza que deseja cancelar esta matrícula?')">Cancelar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(matriculas)}" class="alert alert-info">
            <p>Você não possui matrículas ativas. Para se matricular, acesse a seção de Disciplinas.</p>
        </div>
    </div>
</body>

</html>
