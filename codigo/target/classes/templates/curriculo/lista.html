<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Currículos</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="gradient-text">Currículos do Sistema</h1>
            <a href="/curriculo/form" class="btn btn-success">+ Novo Currículo</a>
        </div>

        <div th:if="${not #lists.isEmpty(curriculos)}" class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Semestre</th>
                        <th scope="col">Data Início</th>
                        <th scope="col">Data Fim</th>
                        <th scope="col">Qty Disciplinas</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="curriculo : ${curriculos}">
                        <td th:text="${curriculo.semestre}">Semestre</td>
                        <td th:text="${#dates.format(curriculo.dataInicio, 'dd/MM/yyyy')}">Início</td>
                        <td th:text="${curriculo.dataFim != null ? #dates.format(curriculo.dataFim, 'dd/MM/yyyy') : '-'}">Fim</td>
                        <td>
                            <span th:if="${curriculo.disciplinas != null}" th:text="${curriculo.disciplinas.size()}"></span>
                            <span th:unless="${curriculo.disciplinas != null}">0</span>
                        </td>
                        <td>
                            <a href="#" class="btn btn-sm btn-info">Editar</a>
                            <a href="#" class="btn btn-sm btn-danger">Deletar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(curriculos)}" class="alert alert-info">
            <p>Nenhum currículo cadastrado. <a href="/curriculo/form">Criar novo currículo</a></p>
        </div>
    </div>
</body>

</html>
